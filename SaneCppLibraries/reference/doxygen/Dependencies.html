<div id="dependency-graph-container">
    <style>
        #dependency-network {
            width: 100%;
            height: 600px;
            border: 1px solid lightgray;
        }
        .dependency-controls {
            margin-bottom: 10px;
        }
        .dependency-legend {
            margin-top: 10px;
            font-size: 12px;
        }
        .dependency-legend-item {
            display: inline-block;
            margin-right: 20px;
        }
    </style>
    <script src="https://unpkg.com/vis-network@9.1.2/standalone/umd/vis-network.min.js"></script>
    <div class="dependency-controls">
        <button id="clearSelection">Clear Selection</button>
        <span id="selectedLibs"></span>
    </div>
    <div id="dependency-network"></div>
    <div class="dependency-legend">
        <div class="dependency-legend-item"><span style="background-color: #FFD700; color: black; padding: 2px 4px; border-radius: 3px;">Selected</span> Selected Libraries</div>
        <div class="dependency-legend-item"><span style="background-color: #FF6B6B; color: black; padding: 2px 4px; border-radius: 3px;">Deps</span> Dependencies</div>
        <div class="dependency-legend-item"><span style="background-color: #4ECDC4; color: black; padding: 2px 4px; border-radius: 3px;">Deps</span> Dependents</div>
        <div class="dependency-legend-item" style="margin-top: 8px; font-style: italic;">Click to select, Ctrl+Click to multi-select</div>
    </div>
    <script>
        (function() {
            // Data
            const nodesData = [{"id": "Async", "label": "Async", "level": 1}, {"id": "AsyncStreams", "label": "AsyncStreams", "level": 0}, {"id": "Await", "label": "Await", "level": 2}, {"id": "Containers", "label": "Containers", "level": 1}, {"id": "ContainersReflection", "label": "ContainersReflection", "level": 2}, {"id": "Fibers", "label": "Fibers", "level": 0}, {"id": "FibersAsync", "label": "FibersAsync", "level": 2}, {"id": "File", "label": "File", "level": 0}, {"id": "FileSystem", "label": "FileSystem", "level": 0}, {"id": "FileSystemIterator", "label": "FileSystemIterator", "level": 0}, {"id": "FileSystemWatcher", "label": "FileSystemWatcher", "level": 0}, {"id": "Foundation", "label": "Foundation", "level": 0}, {"id": "Hashing", "label": "Hashing", "level": 0}, {"id": "Http", "label": "Http", "level": 2}, {"id": "HttpClient", "label": "HttpClient", "level": 0}, {"id": "Memory", "label": "Memory", "level": 0}, {"id": "Plugin", "label": "Plugin", "level": 2}, {"id": "Process", "label": "Process", "level": 1}, {"id": "Reflection", "label": "Reflection", "level": 0}, {"id": "SerialPort", "label": "SerialPort", "level": 1}, {"id": "SerializationBinary", "label": "SerializationBinary", "level": 1}, {"id": "SerializationText", "label": "SerializationText", "level": 1}, {"id": "Socket", "label": "Socket", "level": 0}, {"id": "Strings", "label": "Strings", "level": 0}, {"id": "Testing", "label": "Testing", "level": 0}, {"id": "Threading", "label": "Threading", "level": 0}, {"id": "Time", "label": "Time", "level": 0}];
            const edgesData = [{"from": "Async", "to": "File", "arrows": "to"}, {"from": "Async", "to": "FileSystem", "arrows": "to"}, {"from": "Async", "to": "Socket", "arrows": "to"}, {"from": "Async", "to": "Threading", "arrows": "to"}, {"from": "Await", "to": "Async", "arrows": "to"}, {"from": "Containers", "to": "Memory", "arrows": "to"}, {"from": "ContainersReflection", "to": "Containers", "arrows": "to"}, {"from": "ContainersReflection", "to": "Reflection", "arrows": "to"}, {"from": "FibersAsync", "to": "Async", "arrows": "to"}, {"from": "FibersAsync", "to": "Fibers", "arrows": "to"}, {"from": "Http", "to": "Async", "arrows": "to"}, {"from": "Http", "to": "AsyncStreams", "arrows": "to"}, {"from": "Plugin", "to": "Process", "arrows": "to"}, {"from": "Process", "to": "File", "arrows": "to"}, {"from": "SerialPort", "to": "File", "arrows": "to"}, {"from": "SerializationBinary", "to": "Reflection", "arrows": "to"}, {"from": "SerializationText", "to": "Reflection", "arrows": "to"}];
            const reverseDeps = {"File": ["Async", "Process", "SerialPort"], "FileSystem": ["Async", "Http"], "Socket": ["Async"], "Threading": ["Async", "FibersAsync"], "Async": ["Await", "FibersAsync", "Http"], "Memory": ["Containers", "ContainersReflection"], "Containers": ["ContainersReflection"], "Reflection": ["ContainersReflection", "SerializationBinary", "SerializationText"], "Fibers": ["FibersAsync"], "AsyncStreams": ["Http"], "Process": ["Plugin"]};
            const transitiveDeps = {"Reflection": [], "FileSystemIterator": [], "Testing": [], "FileSystem": [], "AsyncStreams": [], "Await": ["Async", "File", "FileSystem", "Socket", "Threading"], "Process": ["File"], "SerializationText": ["Reflection"], "Containers": ["Memory"], "Threading": [], "ContainersReflection": ["Containers", "Memory", "Reflection"], "Fibers": [], "FibersAsync": ["Async", "Fibers", "File", "FileSystem", "Socket", "Threading"], "Hashing": [], "FileSystemWatcher": [], "HttpClient": [], "SerialPort": ["File"], "Time": [], "Async": ["File", "FileSystem", "Socket", "Threading"], "Plugin": ["File", "Process"], "SerializationBinary": ["Reflection"], "Memory": [], "Http": ["Async", "AsyncStreams", "File", "FileSystem", "Socket", "Threading"], "File": [], "Socket": [], "Strings": [], "Foundation": []};

            // Create network
            const container = document.getElementById('dependency-network');
            const data = {
                nodes: new vis.DataSet(nodesData),
                edges: new vis.DataSet(edgesData)
            };

            const options = {
                layout: {
                    hierarchical: {
                        direction: 'UD',
                        sortMethod: 'directed',
                        levelSeparation: 150,
                        nodeSpacing: 100
                    }
                },
                physics: false,
                interaction: {
                    multiselect: false,
                    selectConnectedEdges: false,
                    zoomView: false
                },
                nodes: {
                    shape: 'box',
                    font: {
                        size: 14
                    }
                },
                edges: {
                    arrows: {
                        to: {
                            enabled: true,
                            scaleFactor: 0.5
                        }
                    }
                }
            };

            const network = new vis.Network(container, data, options);

            let selectedNodes = new Set();

            function updateHighlighting() {
                const allNodeIds = data.nodes.getIds();
                const allEdgeIds = data.edges.getIds();
                const nodeUpdates = [];
                const edgeUpdates = [];

                if (selectedNodes.size === 0) {
                    allNodeIds.forEach(id => {
                        nodeUpdates.push({
                            id: id,
                            color: null, // Use null to reset to default color
                            font: { color: 'black' }
                        });
                    });
                    allEdgeIds.forEach(id => {
                        edgeUpdates.push({
                            id: id,
                            color: null // Use null to reset to default color
                        });
                    });
                    data.nodes.update(nodeUpdates);
                    data.edges.update(edgeUpdates);
                    document.getElementById('selectedLibs').textContent = '';
                    return;
                }

                const dependencies = new Set();
                const dependents = new Set();

                selectedNodes.forEach(lib => {
                    if (transitiveDeps[lib]) {
                        transitiveDeps[lib].forEach(dep => dependencies.add(dep));
                    }
                    if (reverseDeps[lib]) {
                        reverseDeps[lib].forEach(dep => dependents.add(dep));
                    }
                });

                allNodeIds.forEach(id => {
                    let color = null; // Default color
                    if (selectedNodes.has(id)) {
                        color = { background: '#FFD700', border: '#B8860B' };
                    } else if (dependencies.has(id)) {
                        color = { background: '#FF6B6B', border: '#CC5555' };
                    } else if (dependents.has(id)) {
                        color = { background: '#4ECDC4', border: '#3A9B94' };
                    }
                    nodeUpdates.push({ id: id, color: color });
                });

                allEdgeIds.forEach(id => {
                    const edge = data.edges.get(id);
                    let color = null; // Default color
                    if (selectedNodes.has(edge.from) && dependencies.has(edge.to)) {
                        color = '#FF6B6B';
                    } else if (dependents.has(edge.from) && selectedNodes.has(edge.to)) {
                        color = '#4ECDC4';
                    }
                    edgeUpdates.push({ id: id, color: color });
                });

                data.nodes.update(nodeUpdates);
                data.edges.update(edgeUpdates);

                document.getElementById('selectedLibs').textContent = 'Selected: ' + Array.from(selectedNodes).join(', ');
            }

            // Custom click handling
            network.on('click', function(params) {
                if (params.nodes.length > 0) {
                    const clickedNode = params.nodes[0];
                    if (params.event.srcEvent.ctrlKey || params.event.srcEvent.metaKey) {
                        // Ctrl+click: toggle selection
                        if (selectedNodes.has(clickedNode)) {
                            selectedNodes.delete(clickedNode);
                        } else {
                            selectedNodes.add(clickedNode);
                        }
                    } else {
                        // Normal click: reset selection to only this node
                        selectedNodes.clear();
                        selectedNodes.add(clickedNode);
                    }
                    network.unselectAll();
                    updateHighlighting();
                } else {
                    // Click on empty space: clear selection
                    selectedNodes.clear();
                    network.unselectAll();
                    updateHighlighting();
                }
            });

            document.getElementById('clearSelection').addEventListener('click', function() {
                selectedNodes.clear();
                network.unselectAll();
                updateHighlighting();
            });
        })();
    </script>
</div>
